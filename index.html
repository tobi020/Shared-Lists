<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Lists</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shared Lists" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <header class="app-header">
    <div class="app-title">
      <span class="app-title-dot"></span>
      <span class="app-title-text">HOLZ<span class="app-title-amp">&</span>STEIN</span>
    </div>
    <div class="sync-indicator" id="sync-indicator" title="Sync-Status"></div>
    <div class="search-wrapper">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input class="search-input" id="global-search" type="text" placeholder="Alle Listen durchsuchen..." autocomplete="off" />
      <button class="search-clear hidden" id="global-search-clear" title="Suche löschen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button class="notify-btn" id="notify-btn" title="Push-Benachrichtigungen aktivieren">
      <svg class="bell-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <svg class="bell-on" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0" fill="none"/></svg>
    </button>
    <button class="theme-btn" id="theme-btn" title="Hell-/Dunkelmodus umschalten">
      <span class="theme-icon-stack">
        <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </span>
    </button>
    <button class="share-btn" id="share-btn" title="Teilen-Link kopieren">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      <span>Teilen</span>
    </button>
    <button class="add-menu-btn" id="add-menu-btn" title="Hinzufügen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </header>

  <main class="dashboard" id="dashboard"></main>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="confirm-backdrop" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="confirm-title"></h2>
        <button class="modal-close" id="confirm-close" aria-label="Schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p class="confirm-message" id="confirm-message"></p>
      <div class="modal-actions">
        <button class="btn" id="confirm-cancel" type="button">Abbrechen</button>
        <button class="btn danger" id="confirm-ok" type="button">Löschen</button>
      </div>
    </div>
  </div>

  <!-- Add List Modal -->
  <div class="modal-backdrop" id="add-list-backdrop" role="dialog" aria-modal="true" aria-labelledby="add-list-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="add-list-title">Neue Liste erstellen</h2>
        <button class="modal-close" id="add-list-close" aria-label="Schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-group" style="margin-bottom: 0">
        <label class="form-label" for="add-list-name">Name</label>
        <input class="form-input" id="add-list-name" type="text" placeholder="z.B. Einkaufsliste" maxlength="40" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button class="btn" id="add-list-cancel" type="button">Abbrechen</button>
        <button class="btn primary" id="add-list-confirm" type="button">Erstellen</button>
      </div>
    </div>
  </div>

  <!-- Add Project Modal -->
  <div class="modal-backdrop" id="add-project-backdrop" role="dialog" aria-modal="true" aria-labelledby="add-project-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="add-project-title">Neues Projekt erstellen</h2>
        <button class="modal-close" id="add-project-close" aria-label="Schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-group" style="margin-bottom: 0">
        <label class="form-label" for="add-project-name">Name</label>
        <input class="form-input" id="add-project-name" type="text" placeholder="z.B. Neapelreise" maxlength="40" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button class="btn" id="add-project-cancel" type="button">Abbrechen</button>
        <button class="btn primary" id="add-project-confirm" type="button">Erstellen</button>
      </div>
    </div>
  </div>

  <!-- Cover Picker Modal -->
  <div class="modal-backdrop" id="cover-picker-backdrop" role="dialog" aria-modal="true" aria-labelledby="cover-picker-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="cover-picker-title">Titelbild wählen</h2>
        <button class="modal-close" id="cover-picker-close" aria-label="Schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p class="cover-picker-hint">Fotos aus der Galerie werden oft nur ausschnittsweise angezeigt. Eine Vorlage sieht auf der Karte meist besser aus.</p>
      <div class="cover-picker-grid" id="cover-picker-grid"></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Eintrag bearbeiten</h2>
        <button class="modal-close" id="modal-close" aria-label="Schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="form-group">
        <label class="form-label" for="edit-text">Text</label>
        <input class="form-input" id="edit-text" type="text" autocomplete="off" />
      </div>

      <div class="form-group">
        <label class="form-label">Priorität</label>
        <div class="priority-buttons">
          <button class="priority-btn" data-priority="low" type="button">
            <span class="priority-dot low"></span> Niedrig
          </button>
          <button class="priority-btn" data-priority="medium" type="button">
            <span class="priority-dot medium"></span> Mittel
          </button>
          <button class="priority-btn" data-priority="high" type="button">
            <span class="priority-dot high"></span> Hoch
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="edit-tags">Tags <span style="opacity:.5">(kommagetrennt)</span></label>
        <input class="form-input" id="edit-tags" type="text" placeholder="z.B. wichtig, arbeit, privat" autocomplete="off" />
      </div>

      <div class="form-group">
        <label class="form-label" for="edit-notes">Notizen</label>
        <textarea class="form-input" id="edit-notes" rows="2" placeholder="Optionale Notizen..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Bild</label>
        <div class="image-field">
          <button class="image-add-btn" id="edit-image-add" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            Foto hinzufügen
          </button>
          <div class="image-preview hidden" id="edit-image-preview">
            <img id="edit-image-thumb" alt="Vorschau" title="Zum Vergrößern tippen" />
            <button class="image-remove-btn" id="edit-image-remove" type="button" aria-label="Bild entfernen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <input class="image-input" id="edit-image-input" type="file" accept="image/*" hidden />
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn" id="modal-cancel" type="button">Abbrechen</button>
        <button class="btn primary" id="modal-save" type="button">Speichern</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js'

    let FIREBASE_CONFIG = null
    try {
      const mod = await import('./firebase-config.js')
      FIREBASE_CONFIG = mod.FIREBASE_CONFIG
      if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') FIREBASE_CONFIG = null
    } catch { /* config file missing — localStorage-only mode */ }

    if (FIREBASE_CONFIG) {
      const app = initializeApp(FIREBASE_CONFIG)
      window._firestoreDb              = getFirestore(app)
      window._firestoreDoc             = doc
      window._firestoreSetDoc          = setDoc
      window._firestoreGetDoc          = getDoc
      window._firestoreOnSnapshot      = onSnapshot
      window._firestoreServerTimestamp = serverTimestamp
    }

    await import('./app.js')
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
    }
  </script>
</body>
</html>
